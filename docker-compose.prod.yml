# Прод-развёртывание Stell22: база + приложение + Caddy (HTTPS автоматически).
# Запуск:  docker compose -f docker-compose.prod.yml up -d --build
# Значения берутся из файла .env рядом (скопируйте .env.deploy.example → .env).

services:
  db:
    image: postgres:17-alpine
    container_name: stell22-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: stell22
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: stell22
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stell22 -d stell22"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Порт наружу НЕ открываем — доступ к БД только внутри docker-сети.

  app:
    build: .
    container_name: stell22-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://stell22:${POSTGRES_PASSWORD}@db:5432/stell22?schema=public
      SESSION_SECRET: ${SESSION_SECRET}
      NODE_ENV: production
      # Мониторинг ошибок (необязательно): вставьте DSN из Sentry в .env.
      SENTRY_DSN: ${SENTRY_DSN:-}
      # Приём выписок с почты (необязательно). Триггерится cron-эндпойнтом
      # /api/cron/fetch-statements (host-cron через curl). Пусто = приём отключён.
      CRON_SECRET: ${CRON_SECRET:-}
      MAIL_IMAP_HOST: ${MAIL_IMAP_HOST:-}
      MAIL_IMAP_PORT: ${MAIL_IMAP_PORT:-993}
      MAIL_IMAP_SECURE: ${MAIL_IMAP_SECURE:-true}
      MAIL_IMAP_USER: ${MAIL_IMAP_USER:-}
      MAIL_IMAP_PASSWORD: ${MAIL_IMAP_PASSWORD:-}
      MAIL_IMAP_MAILBOX: ${MAIL_IMAP_MAILBOX:-INBOX}
      MAIL_ALLOWED_SENDERS: ${MAIL_ALLOWED_SENDERS:-}
      MAIL_MARK_SEEN: ${MAIL_MARK_SEEN:-true}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  caddy:
    image: caddy:2-alpine
    container_name: stell22-caddy
    restart: unless-stopped
    depends_on:
      - app
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  db-data:
  caddy-data:
  caddy-config:
